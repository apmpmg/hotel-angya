<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>ホテル巡礼</title>

  <link
    rel="stylesheet"
    href="style.css?v=999"
  />
</head>

<body>

  <header>
    <h1>ホテル巡礼</h1>
    <p>行ったホテルを記録するサイト</p>
  </header>

  <nav class="nav">

    <button
      data-page="home"
      onclick="showPage('home')"
    >
      <span>🏠</span>
      <span>ホーム</span>
    </button>

    <button
      data-page="search"
      onclick="showPage('search')"
    >
      <span>🔍</span>
      <span>検索</span>
    </button>

    <button
      data-page="record"
      onclick="showPage('record')"
    >
      <span>📝</span>
      <span>記録</span>
    </button>

    <button
      data-page="ranking"
      onclick="showPage('ranking')"
    >
      <span>🏆</span>
      <span>ランキング</span>
    </button>

    <button
      data-page="mypage"
      onclick="showPage('mypage')"
    >
      <span>👤</span>
      <span>マイページ</span>
    </button>

  </nav>

  <main id="content"></main>

  <script
    type="module"
    src="app.js?v=999"
  ></script>

</body>
</html>
